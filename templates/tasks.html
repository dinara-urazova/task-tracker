{% extends 'base.html' %}

{% block content %}
<h1>Все задачи</h1>

<a href="/tasks/new" class="button">Создать новую</a>

<div class="container">
    {% if tasks %}
    <ol>
        {% for task in tasks %}
        <li><a href="/tasks/{{task.id}}">{{ task.name }}</a></li>
        {% endfor %}
    </ol>
    {% else %}
    <p>Список пуст. Создайте свою первую задачу.</p>
    {% endif %}
</div>

{% endblock %}
